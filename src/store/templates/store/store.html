{% extends "layout.html" %}
{%block content%}
<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store</title>
      <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
        }
      </style>
</head>
<body>
  <p>Store</p>
    <a href="/store/cart">Go to Cart</a>

    <div class="grid">
        {% for item in items %}
            <div class="card">
                {% comment %} <img src="{{ item.image.url }}" alt="{{ item.name }}"> {% endcomment %}
                <h3>{{ item.name }}</h3>
                <p>${{ item.price }}</p>
                <p>{{ item.description }}</p>
                <form action="{% url 'add_to_cart' item.id %}" method="POST">
                        {% csrf_token %}
                    <button type="submit" class="btn">Add to Cart</button>
                </form>
            </div>
        {% endfor %}
    </div>

</body>
</html>
{% endblock %}
